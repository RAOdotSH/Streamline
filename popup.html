<!DOCTYPE html>

<html>

<head>
  <meta charset="utf-8">
  <titl> Streamline </title>
    <link rel="stylesheet" href="popup.css">
    <script src="script.js"> </script>
</head>

<body>
  <!-- Body will contain a Header = Streamline. A input field to add custom speed and a button to submit. And counters which varies from 0.5 to 4 with difference of 0.5 with two buttons '+' and "-" on either side. -->

  <div class="container">
    <div class="header">
      <h1> Streamline </h1>
    </div>

    <div class="finder">
      <div class="finder__outer">
        <div class="finder__inner">
          <div class="finder__icon" ref="icon"></div>
          <input id="speed_input" class="finder__input" type="text" name="q" placeholder="Custom Speed" />
        </div>
      </div>
    </div>

    <div class="Submit" <button class="btn" id="submit" onclick="changePlaybackRate()"> Submit </button>
    </div>

    <div class="counter">
      <button id="minus"> - </button>
      <span id="count"> 1 </span>
      <button id="plus"> + </button>
    </div>
  </div>

</body>

</html>
